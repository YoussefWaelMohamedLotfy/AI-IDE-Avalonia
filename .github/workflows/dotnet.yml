# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET Build & Test

on:
  push:

jobs:
  build:

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact-name: AI-IDE-Avalonia-win-x64-Setup
          - os: ubuntu-latest
            rid: linux-x64
            artifact-name: AI-IDE-Avalonia-linux-x64
          - os: macos-latest
            rid: osx-x64
            artifact-name: AI-IDE-Avalonia-osx-x64
            zip-name: AI-IDE-Avalonia-osx-x64.zip

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore -r ${{ matrix.rid }}

    - name: Build
      run: dotnet build --no-restore -c Release

    - name: Expose GitHub Actions Runtime
      uses: actions/github-script@v8
      with:
        script: |
          core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env['ACTIONS_RUNTIME_TOKEN']);
          core.exportVariable('ACTIONS_RESULTS_URL', process.env['ACTIONS_RESULTS_URL']);

    - name: Test
      run: dotnet test --no-build -c Release --verbosity normal

    - name: Publish
      run: dotnet publish AI-IDE-Avalonia/AI-IDE-Avalonia.csproj --no-restore -c Release -r ${{ matrix.rid }} -o publish

    - name: Compress publish output (Linux/macOS)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        if [ "${{ runner.os }}" = "Linux" ]; then
          chmod +x publish/AI-IDE-Avalonia
          chmod +x publish/runtimes/linux-x64/native/copilot
          tar --zstd -cf ${{ matrix.artifact-name }}.tar.zst -C publish . 
        else
          tar -czf ${{ matrix.zip-name }} -C publish .
        fi

    - name: Upload artifact (non-Windows)
      if: runner.os != 'Windows'
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.artifact-name }}
        path: ${{ runner.os == 'Linux' && format('{0}.tar.zst', matrix.artifact-name) || matrix.zip-name }}
        compression-level: 0

    - name: Install InnoSetup (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: choco install innosetup

    - name: Build installer (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $iscc = (Get-ChildItem "C:\Program Files (x86)\Inno Setup*\ISCC.exe" -ErrorAction Stop | Select-Object -First 1).FullName
        New-Item -ItemType Directory -Force -Path installer-output | Out-Null
        & $iscc installer/AI-IDE-Avalonia.iss

    - name: Upload installer artifact (Windows)
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.artifact-name }}
        path: installer-output/AI-IDE-Avalonia-win-x64-Setup.exe
        compression-level: 0
