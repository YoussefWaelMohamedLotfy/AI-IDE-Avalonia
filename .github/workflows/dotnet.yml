# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET Build & Test

on:
  push:

jobs:
  build:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore -c Release

    - name: Test
      run: dotnet test --no-build -c Release --verbosity normal

    - name: Publish
      run: dotnet publish --no-restore -c Release -r win-x64 --self-contained false -o publish

    - name: Zip publish output
      run: Compress-Archive -Path publish\* -DestinationPath AI-IDE-Avalonia.zip

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: AI-IDE-Avalonia
        path: AI-IDE-Avalonia.zip
