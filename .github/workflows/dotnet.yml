# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET Build & Test

on:
  push:

jobs:
  build:

    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact-name: AI-IDE-Avalonia-win-x64
            zip-name: AI-IDE-Avalonia-win-x64.zip
          - os: ubuntu-latest
            rid: linux-x64
            artifact-name: AI-IDE-Avalonia-linux-x64
            zip-name: AI-IDE-Avalonia-linux-x64.zip
          - os: macos-latest
            rid: osx-x64
            artifact-name: AI-IDE-Avalonia-osx-x64
            zip-name: AI-IDE-Avalonia-osx-x64.zip

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore -c Release

    - name: Test
      run: dotnet test --no-build -c Release --verbosity normal

    - name: Publish
      run: dotnet publish --no-restore -c Release -r ${{ matrix.rid }} --self-contained false -o publish

    - name: Zip publish output
      shell: pwsh
      run: Compress-Archive -Path publish/* -DestinationPath ${{ matrix.zip-name }}

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.artifact-name }}
        path: ${{ matrix.zip-name }}
